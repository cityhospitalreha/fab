<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FAB</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FAB">
<meta name="theme-color" content="#7C3AED">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2F3F7;--white:#FFF;--ink:#1A1A1A;--muted:#9A9A9F;--line:#E0E2EA;
  --accent:#7C3AED;--on:#7C3AED;--on-lt:#F5F3FF;
  --green:#15803D;--green-lt:#F0FDF4;
  --amber:#B45309;--amber-lt:#FFFBEB;
  --red:#B91C1C;--red-lt:#FEF2F2;
}
html,body{height:100%;background:var(--bg);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--ink);}
.screen{display:none;flex-direction:column;align-items:center;min-height:100%;padding-bottom:1rem;}
.screen.active{display:flex;}

/* HOME */
#home{padding:0 1rem;}
.home-hdr{width:100%;max-width:480px;padding:1.5rem 0 1rem;display:flex;align-items:baseline;justify-content:space-between;}
.home-hdr h1{font-size:1.2rem;font-weight:700;}
.home-hdr .sub{font-size:.72rem;color:var(--muted);}
.field{width:100%;max-width:480px;margin-bottom:.7rem;}
.field label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:.3rem;}
.field input{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:1rem;background:var(--white);color:var(--ink);outline:none;}
.field input:focus{border-color:var(--accent);}
.go-btn{width:100%;max-width:480px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:1.5rem;}
.log-hdr{width:100%;max-width:480px;font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:.5rem;}
.log-empty{width:100%;max-width:480px;text-align:center;color:var(--muted);font-size:.85rem;padding:1rem 0;}
.log-row{width:100%;max-width:480px;background:var(--white);border-radius:12px;padding:.75rem 1rem;margin-bottom:.45rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.log-row:active{opacity:.7;}
.log-left .ini{font-size:1rem;font-weight:700;}
.log-left .dt{font-size:.72rem;color:var(--muted);margin-top:.1rem;}
.log-right{text-align:right;}
.log-sc{font-size:1.3rem;font-weight:700;}
.log-sc.hi{color:var(--green);}
.log-sc.mid{color:var(--amber);}
.log-sc.lo{color:var(--red);}
.log-tag{font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:99px;margin-top:.2rem;display:inline-block;}
.tag-hi{background:var(--green-lt);color:var(--green);}
.tag-mid{background:var(--amber-lt);color:var(--amber);}
.tag-lo{background:var(--red-lt);color:var(--red);}

/* EXAM */
#exam{padding:0 .75rem;}
.exam-hdr{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:.55rem 0 .45rem;border-bottom:1px solid var(--line);margin-bottom:.45rem;position:sticky;top:0;background:var(--bg);z-index:10;}
.exam-hdr .who{font-size:.9rem;font-weight:700;}
.exam-hdr .dt2{font-size:.62rem;color:var(--muted);}
.exam-hdr .live{font-size:1rem;font-weight:700;color:var(--accent);}
.quit{background:none;border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:.68rem;font-family:inherit;color:var(--muted);cursor:pointer;}
.sec-label{width:100%;max-width:480px;font-size:.58rem;font-weight:700;letter-spacing:.1em;color:var(--muted);margin:.4rem 0 .2rem;}

/* ITEM ROW */
.item-row{width:100%;max-width:480px;background:var(--white);border-radius:8px;padding:.42rem .75rem;margin-bottom:.22rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:pointer;user-select:none;border:2px solid transparent;transition:background .12s,border-color .12s;}
.item-row.on{background:var(--on-lt);border-color:var(--on);}
.item-row:active{opacity:.75;}
.item-text{font-size:.8rem;color:var(--ink);flex:1;line-height:1.3;}
.item-row.on .item-text{font-weight:600;color:var(--on);}
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;color:transparent;background:var(--white);transition:all .12s;}
.item-row.on .item-check{background:var(--on);border-color:var(--on);color:#fff;}

/* PARTIAL */
.partial-row{width:100%;max-width:480px;background:var(--white);border-radius:10px;padding:.55rem .75rem;margin-bottom:.3rem;display:flex;flex-direction:column;gap:.35rem;}
.partial-label{font-size:.82rem;font-weight:600;color:var(--ink);line-height:1.4;}
.guide-list{display:flex;flex-direction:column;gap:.18rem;}
.guide-item{font-size:.72rem;color:var(--muted);padding:2px 6px;border-radius:5px;border-left:2px solid var(--line);transition:all .15s;}
.guide-active{color:var(--on);font-weight:700;border-left-color:var(--on);background:var(--on-lt);}
.score-row-fab{display:flex;align-items:center;justify-content:space-between;margin-top:.1rem;}
.partial-val{font-size:.85rem;font-weight:700;color:var(--on);white-space:nowrap;}
.partial-btns{display:flex;gap:.3rem;}
.pt-btn{width:34px;height:34px;border:1.5px solid var(--line);border-radius:7px;background:var(--white);font-family:inherit;font-size:.9rem;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.pt-btn.sel{background:var(--on);border-color:var(--on);color:#fff;}
.proc-toggle{
  background:none;border:none;font-family:inherit;font-size:.7rem;
  color:var(--accent);cursor:pointer;padding:0;margin:.1rem 0;text-align:left;
  font-weight:600;
}
.proc-list{margin:.2rem 0 .3rem;display:flex;flex-direction:column;gap:.2rem;}
.proc-step{
  font-size:.72rem;color:var(--ink2);padding:3px 7px;
  background:var(--bg);border-radius:5px;line-height:1.5;
  border-left:2px solid var(--accent);
}

/* BOT BAR */
.bot-bar{position:sticky;bottom:0;width:100%;max-width:480px;background:var(--white);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;z-index:20;margin-top:.5rem;}
.bot-total{display:flex;align-items:baseline;gap:.3rem;}
.bot-total .big{font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1;}
.bot-total .denom{font-size:.75rem;color:var(--muted);}
.done-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;}

/* RESULT */
#result{padding:0 1rem;}
.res-hero{width:100%;max-width:480px;border-radius:0 0 16px 16px;padding:1.75rem 1.25rem 1.5rem;text-align:center;color:#fff;margin-bottom:1rem;}
.res-hero{background:var(--accent);}
.res-ini{font-size:.82rem;opacity:.85;margin-bottom:.25rem;}
.res-big{font-size:4.5rem;font-weight:700;line-height:1;}
.res-of{font-size:.9rem;opacity:.75;margin-bottom:.3rem;}
.res-judge{font-size:.9rem;font-weight:600;}
.res-dt{font-size:.72rem;opacity:.7;margin-top:.2rem;}
.det-sec{width:100%;max-width:480px;margin-bottom:.5rem;}
.det-sec-lbl{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:.3rem;}
.det-row{background:var(--white);border-radius:10px;padding:.65rem .9rem;margin-bottom:.3rem;display:flex;align-items:center;justify-content:space-between;}
.det-q{font-size:.83rem;color:var(--ink);}
.det-sc{font-size:.9rem;font-weight:700;}
.det-sc.hi{color:var(--green);}
.det-sc.lo{color:var(--red);}
.det-sc.mid{color:var(--amber);}
.act-col{width:100%;max-width:480px;display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem;}
.act-btn{width:100%;padding:14px;border-radius:11px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;border:none;}
.act-btn.primary{background:var(--accent);color:#fff;}
.act-btn.ghost{background:var(--white);color:var(--ink);border:1.5px solid var(--line);}

/* WORD COUNTER */
.wc-box{background:var(--bg);border-radius:8px;padding:.45rem .65rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin:.15rem 0;}
.wc-display{display:flex;align-items:baseline;gap:.2rem;}
.wc-num{font-size:1.6rem;font-weight:700;color:var(--accent);line-height:1;min-width:2ch;text-align:right;}
.wc-unit{font-size:.7rem;color:var(--muted);}
.wc-btns{display:flex;gap:.4rem;align-items:center;}
.wc-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);font-size:1.1rem;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wc-btn.plus{background:var(--accent);border-color:var(--accent);color:#fff;font-size:1.3rem;}
.wc-btn.reset{font-size:.7rem;color:var(--muted);width:auto;padding:0 8px;}

/* TIMER (c2) */
.timer-box{background:var(--bg);border-radius:10px;padding:.55rem .75rem;margin:.15rem 0 .3rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
.timer-display{display:flex;align-items:baseline;gap:.15rem;}
.timer-num{font-size:2.2rem;font-weight:700;line-height:1;min-width:2.2ch;text-align:right;transition:color .2s;}
.timer-num.running{color:var(--accent);}
.timer-num.done{color:var(--green);}
.timer-num.urgent{color:var(--red);}
.timer-unit{font-size:.7rem;color:var(--muted);}
.timer-btns{display:flex;gap:.4rem;}
.timer-btn{height:36px;padding:0 14px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);font-family:inherit;font-size:.78rem;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.timer-btn.start{background:var(--accent);border-color:var(--accent);color:#fff;}
.timer-btn.stop{background:var(--amber-lt);border-color:var(--amber);color:var(--amber);}
.timer-btn.reset-t{color:var(--muted);}

/* RECORDER (c2) */
.rec-box{background:var(--bg);border-radius:10px;padding:.55rem .75rem;margin:.1rem 0 .3rem;display:flex;flex-direction:column;gap:.4rem;}
.rec-row{display:flex;align-items:center;gap:.4rem;}
.rec-btn{height:36px;padding:0 14px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);font-family:inherit;font-size:.78rem;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:all .15s;}
.rec-btn.rec-start{background:#DC2626;border-color:#DC2626;color:#fff;}
.rec-btn.rec-stop{background:var(--amber-lt);border-color:var(--amber);color:var(--amber);}
.rec-btn.rec-del{color:var(--muted);font-size:.72rem;}
.rec-btn.rec-save{background:var(--green-lt);border-color:var(--green);color:var(--green);}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.rec-status{font-size:.72rem;color:var(--muted);}
.rec-status.recording{color:#DC2626;font-weight:700;}
.rec-audio{width:100%;height:36px;accent-color:var(--accent);}

/* NORM TABLE */
.norm-wrap{width:100%;max-width:480px;margin-bottom:.6rem;}
.norm-lbl{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:var(--muted);margin-bottom:.3rem;}
.norm-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:10px;overflow:hidden;font-size:.72rem;}
.norm-table th{background:var(--bg);color:var(--muted);font-weight:700;padding:.35rem .5rem;text-align:center;border-bottom:1px solid var(--line);}
.norm-table td{padding:.38rem .5rem;text-align:center;border-bottom:1px solid var(--line);color:var(--ink);}
.norm-table tr:last-child td{border-bottom:none;}
.norm-table td:first-child{text-align:left;font-weight:600;}
</style>
</head>
<body>

<div class="screen active" id="home">
  <div class="home-hdr"><h1>FAB</h1><span class="sub">前頭葉機能検査</span></div>
  <div class="field"><label>イニシャル</label><input id="ini" type="text" placeholder="例：A.T" maxlength="10"></div>
  <div class="field"><label>実施日時</label><input id="dt" type="datetime-local"></div>
  <button class="go-btn" onclick="startExam()">開始</button>
  <div class="log-hdr" style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:480px;">
    <span>最近の記録（7日間）</span>
    <button id="clear-all-btn" onclick="clearAllLog()" style="display:none;background:none;border:none;font-family:inherit;font-size:.68rem;color:var(--red);cursor:pointer;padding:2px 4px;font-weight:600;">全削除</button>
  </div>
  <div id="log-list"><div class="log-empty">記録なし</div></div>
</div>

<div class="screen" id="exam">
  <div class="exam-hdr">
    <div><div class="who" id="ex-who"></div><div class="dt2" id="ex-dt"></div></div>
    <div style="display:flex;align-items:center;gap:.6rem;">
      <div class="live" id="ex-live">0 / 18</div>
      <button class="quit" onclick="quit()">中断</button>
    </div>
  </div>
  <div id="ex-body" style="width:100%;max-width:480px;"></div>
  <div class="bot-bar">
    <div class="bot-total"><div class="big" id="bar-n">0</div><div class="denom">/ 18点</div></div>
    <button class="done-btn" onclick="finish()">完了</button>
  </div>
</div>

<div class="screen" id="result">
  <div class="res-hero" id="r-hero">
    <div class="res-ini" id="r-ini"></div>
    <div class="res-big" id="r-big"></div>
    <div class="res-of">/ 18点</div>
    <div class="res-judge" id="r-judge"></div>
    <div class="res-dt" id="r-dt"></div>
  </div>
  <div id="r-det" style="width:100%;max-width:480px;"></div>
  <div class="norm-wrap">
    <div class="norm-lbl">年齢別基準値（Dubois 2000）</div>
    <table class="norm-table">
      <thead><tr><th>年齢</th><th>FAB合計（平均±SD）</th></tr></thead>
      <tbody id="norm-body"></tbody>
    </table>
  </div>
  <div class="act-col">
    <button class="act-btn primary" onclick="newExam()">続けて検査</button>
    <button class="act-btn ghost" onclick="goHome()">ホームへ</button>
  </div>
</div>

<script>
const TOTAL = 18;
const SECS = [
  { label:'①  類似性（概念化）', items:[
    {id:'c1',
     q:'次の2つは、どのような点が似ていますか？',
     proc:[
       '①「バナナとオレンジ」　正解例：果物',
       '②「机と椅子」　　　　 正解例：家具',
       '③「チューリップとバラとヒナギク」　正解例：花',
       '①のみヒント可：完全な間違い or「皮がある」など部分的な間違いの場合',
       '→「バナナとオレンジはどちらも…」とヒントを出す',
       '②③はヒントなし',
     ],
     guide:['3つとも正解 → 3点','2つ正解 → 2点','1つ正解 → 1点','正答なし → 0点']},
  ]},
  { label:'②  語の流暢性（柔軟性）', items:[
    {id:'c2',
     q:'「か」で始まる単語をできるだけたくさん言ってください',
     proc:[
       '「かで始まる単語をできるだけたくさん言ってください」',
       '「ただし、人の名前や固有名詞は除きます」',
       '制限時間60秒。最初の5秒間反応がなかったら',
       '→「例えば、紙」とヒントを出す',
       '→ さらに10秒間黙っていたら「かで始まる単語なら何でもいいですから」と刺激',
       '同じ単語の繰り返し・変形（傘、傘の柄など）・人名・固有名詞は正答としない',
     ],
     counter:true,
     guide:['10語以上 → 3点','6〜9語 → 2点','3〜5語 → 1点','2語以下 → 0点']},
  ]},
  { label:'③  運動系列（運動プログラミング）', items:[
    {id:'c3',
     q:'「拳（グー）→ 刀（チョキ）→ 掌（パー）」の Luria 系列',
     proc:[
       '検者が左手で「拳→刀→掌」を3回実施して見せる',
       '「では、右手で同じことをしてください」',
       '「はじめは私と一緒に、次は独りでやってみてください」と言う',
       '被検者独りで正しい系列を6回連続できるか確認',
     ],
     guide:[
       '被検者独りで、正しい系列を6回連続してできる → 3点',
       '被検者独りで、正しい系列を少なくとも3回連続してできる → 2点',
       '被検者独りではできないが、検者と一緒に正しい系列を3回連続できる → 1点',
       '検者と一緒でも正しい系列を3回連続することができない → 0点',
     ]},
  ]},
  { label:'④  葛藤指示', items:[
    {id:'c4',
     q:'私が1回叩いたら→2回　／　2回叩いたら→1回',
     proc:[
       '「私が1回叩いたら、2回叩いてください」',
       '→ 被検者が指示を理解したことを確認してから系列実施：1－1－1',
       '「私が2回叩いたら、1回叩いてください」',
       '→ 被検者が指示を理解したことを確認してから系列実施：2－2－2',
       '本番系列：1－1－2－1－2－2－2－1－1－2',
     ],
     guide:[
       '間違いなく可能 → 3点',
       '1、2回の間違いで可能 → 2点',
       '3回以上の間違い → 1点',
       '被検者が4回連続して検者と同じように叩く（echopraxia）→ 0点',
     ]},
  ]},
  { label:'⑤  Go / No-Go', items:[
    {id:'c5',
     q:'私が1回叩いたら→叩く　／　2回叩いたら→叩かない',
     proc:[
       '「私が1回叩いたら、1回叩いてください」',
       '→ 被検者が指示を理解したことを確認してから系列実施：1－1－1',
       '「私が2回叩いたら、叩かないでください」',
       '→ 被検者が指示を理解したことを確認してから系列実施：2－2－2',
       '本番系列：1－1－2－1－2－2－2－1－1－2',
     ],
     guide:[
       '間違いなく可能 → 3点',
       '1、2回の間違いで可能 → 2点',
       '3回以上の間違い → 1点',
       '被検者が4回連続して検者と同じように叩く → 0点',
     ]},
  ]},
  { label:'⑥  把握行動（環境への被影響性）', items:[
    {id:'c6',
     q:'「私の手を握らないでください」',
     proc:[
       '被検者に両手の手掌面を上に向けて膝の上に置くよう指示する',
       '検者は何も言わないか、あるいは被検者の方を見ないで',
       '両手を被検者の手の近くに持っていき両手の手掌面に触れる',
       '被検者が自発的に検者の手を握るかどうかみる',
       '握った場合：「今度は、私の手を握らないでください」と言ってもう一度繰り返す',
     ],
     guide:[
       '被検者は検者の手を握らない → 3点',
       '被検者は戸惑って、何をすればいいのか尋ねてくる → 2点',
       '被検者は戸惑うことなく、検者の手を握る → 1点',
       '被検者は握らなくてもいいと言われた後でも、検者の手を握る → 0点',
     ]},
  ]},
];

let sc={}, session=null, log=[];

// ── 録音（c2用）────────────────────────────
let mediaRecorder=null, audioChunks=[], audioBlob=null, audioURL=null;

function recStart(){
  if(mediaRecorder && mediaRecorder.state==='recording') return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    audioChunks=[];
    // iOSはaudio/mp4、それ以外はwebmを試みる
    const mimeType=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    mediaRecorder=new MediaRecorder(stream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      audioBlob=new Blob(audioChunks,{type:mimeType});
      if(audioURL) URL.revokeObjectURL(audioURL);
      audioURL=URL.createObjectURL(audioBlob);
      const audio=document.getElementById('rec-audio');
      if(audio){audio.src=audioURL; audio.style.display='block';}
      stream.getTracks().forEach(t=>t.stop());
      _recUI('stopped');
    };
    mediaRecorder.start();
    _recUI('recording');
  }).catch(()=>{
    alert('マイクへのアクセスが拒否されました。\nブラウザの設定でマイクを許可してください。');
  });
}

function recStop(){
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
}

function recDelete(){
  recStop();
  audioChunks=[]; audioBlob=null;
  if(audioURL){URL.revokeObjectURL(audioURL); audioURL=null;}
  const audio=document.getElementById('rec-audio');
  if(audio){audio.src=''; audio.style.display='none';}
  _recUI('idle');
}

function recSave(){
  if(!audioBlob) return;
  const ext=audioBlob.type.includes('mp4')?'m4a':'webm';
  const now=new Date();
  const ts=`${now.getMonth()+1}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const ini=session&&session.ini?session.ini.replace(/[^A-Za-z0-9._-]/g,''):'rec';
  const fname=`FAB_${ini}_${ts}.${ext}`;
  const a=document.createElement('a');
  a.href=audioURL; a.download=fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function _recUI(state){
  const startBtn=document.getElementById('rec-start');
  const stopBtn=document.getElementById('rec-stop');
  const delBtn=document.getElementById('rec-del');
  const status=document.getElementById('rec-status');
  if(!startBtn) return;
  if(state==='recording'){
    startBtn.style.display='none';
    stopBtn.style.display='flex';
    delBtn.style.display='none';
    status.textContent='● 録音中…'; status.className='rec-status recording';
  } else if(state==='stopped'){
    startBtn.style.display='flex'; startBtn.innerHTML='🎙️ 録り直す';
    stopBtn.style.display='none';
    delBtn.style.display='flex';
    status.textContent='録音済み'; status.className='rec-status';
  } else {
    startBtn.style.display='flex'; startBtn.innerHTML='🎙️ 録音';
    stopBtn.style.display='none';
    delBtn.style.display='none';
    status.textContent=''; status.className='rec-status';
  }
}
// ─────────────────────────────────────────────
let timerInterval=null, timerSec=60;
function timerStart(){
  if(timerInterval) return; // 二重起動防止
  const numEl=document.getElementById('timer-num');
  const startBtn=document.getElementById('timer-start');
  const stopBtn=document.getElementById('timer-stop');
  if(!numEl) return;
  startBtn.style.display='none'; stopBtn.style.display='flex';
  numEl.className='timer-num running';
  timerInterval=setInterval(()=>{
    timerSec--;
    numEl.textContent=timerSec;
    if(timerSec<=10) numEl.className='timer-num urgent';
    if(timerSec<=0){
      clearInterval(timerInterval); timerInterval=null;
      numEl.textContent='0'; numEl.className='timer-num done';
      stopBtn.style.display='none'; startBtn.style.display='flex';
      startBtn.textContent='もう一度'; startBtn.style.opacity='.55';
      startBtn.disabled=true;
    }
  },1000);
}
function timerStop(){
  clearInterval(timerInterval); timerInterval=null;
  const numEl=document.getElementById('timer-num');
  const startBtn=document.getElementById('timer-start');
  const stopBtn=document.getElementById('timer-stop');
  if(!numEl) return;
  numEl.className='timer-num';
  stopBtn.style.display='none'; startBtn.style.display='flex';
  startBtn.textContent='再開';
}
function timerReset(){
  clearInterval(timerInterval); timerInterval=null;
  timerSec=60;
  const numEl=document.getElementById('timer-num');
  const startBtn=document.getElementById('timer-start');
  const stopBtn=document.getElementById('timer-stop');
  if(!numEl) return;
  numEl.textContent='60'; numEl.className='timer-num';
  stopBtn.style.display='none';
  startBtn.style.display='flex'; startBtn.textContent='スタート';
  startBtn.style.opacity=''; startBtn.disabled=false;
}
// ─────────────────────────────────────────────

const STORAGE_KEY='fab_log';
const RETENTION_DAYS=7;

function loadLog(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return [];
    const arr=JSON.parse(raw);
    const cutoff=Date.now()-RETENTION_DAYS*24*60*60*1000;
    return arr.filter(r=>r.ts&&r.ts>=cutoff);
  }catch(e){return [];}
}

function saveLog(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(log));}catch(e){}
}

window.onload=()=>{
  const now=new Date(), loc=new Date(now-now.getTimezoneOffset()*60000);
  document.getElementById('dt').value=loc.toISOString().slice(0,16);
  log=loadLog();
  renderLog();
};

function startExam(){
  const ini=document.getElementById('ini').value.trim();
  const dt=document.getElementById('dt').value;
  if(!ini){alert('イニシャルを入力してください');return;}
  session={ini,dt}; sc={};
  SECS.forEach(s=>s.items.forEach(item=>{sc[item.id]=null;}));
  document.getElementById('ex-who').textContent=ini;
  document.getElementById('ex-dt').textContent=fmtDT(dt);
  buildExam(); updTotal(); show('exam');
}

function buildExam(){
  timerReset(); // 前回のタイマーが残らないようリセット
  const body=document.getElementById('ex-body'); body.innerHTML='';
  SECS.forEach(sec=>{
    const lbl=document.createElement('div'); lbl.className='sec-label'; lbl.textContent=sec.label; body.appendChild(lbl);
    sec.items.forEach(item=>body.appendChild(makePartialRow(item)));
  });
}

function makePartialRow(item){
  const div=document.createElement('div'); div.className='partial-row'; div.id='partial-'+item.id;

  // 問題文
  const lbl=document.createElement('div'); lbl.className='partial-label'; lbl.textContent=item.q; div.appendChild(lbl);

  // 手順（折りたたみ）
  if(item.proc){
    const toggle=document.createElement('button'); toggle.className='proc-toggle'; toggle.textContent='手順を見る ▾';
    const procList=document.createElement('div'); procList.className='proc-list'; procList.style.display='none';
    item.proc.forEach(step=>{
      const d=document.createElement('div'); d.className='proc-step'; d.textContent=step; procList.appendChild(d);
    });
    toggle.onclick=()=>{
      const open=procList.style.display==='none';
      procList.style.display=open?'block':'none';
      toggle.textContent=open?'手順を閉じる ▴':'手順を見る ▾';
    };
    div.appendChild(toggle); div.appendChild(procList);
  }

  // 採点基準
  if(item.guide){
    const guide=document.createElement('div'); guide.className='guide-list';
    item.guide.forEach((g,i)=>{
      const span=document.createElement('div'); span.className='guide-item'; span.id=`guide-${item.id}-${i}`; span.textContent=g;
      guide.appendChild(span);
    });
    div.appendChild(guide);
  }

  // タイマー（c2専用）
  if(item.counter){
    timerReset(); // 画面構築時にリセット
    const tbox=document.createElement('div'); tbox.className='timer-box';
    const tDisp=document.createElement('div'); tDisp.className='timer-display';
    const tNum=document.createElement('span'); tNum.className='timer-num'; tNum.id='timer-num'; tNum.textContent='60';
    const tUnit=document.createElement('span'); tUnit.className='timer-unit'; tUnit.textContent='秒';
    tDisp.appendChild(tNum); tDisp.appendChild(tUnit);
    const tBtns=document.createElement('div'); tBtns.className='timer-btns';
    const tStart=document.createElement('button'); tStart.className='timer-btn start'; tStart.id='timer-start'; tStart.textContent='スタート'; tStart.onclick=timerStart;
    const tStop=document.createElement('button'); tStop.className='timer-btn stop'; tStop.id='timer-stop'; tStop.textContent='一時停止'; tStop.style.display='none'; tStop.onclick=timerStop;
    const tReset=document.createElement('button'); tReset.className='timer-btn reset-t'; tReset.textContent='リセット'; tReset.onclick=timerReset;
    tBtns.appendChild(tStart); tBtns.appendChild(tStop); tBtns.appendChild(tReset);
    tbox.appendChild(tDisp); tbox.appendChild(tBtns);
    div.appendChild(tbox);
  }

  // 録音（c2専用）
  if(item.counter){
    recDelete(); // 画面構築時にリセット
    const rbox=document.createElement('div'); rbox.className='rec-box';
    const rrow=document.createElement('div'); rrow.className='rec-row';
    const rStart=document.createElement('button'); rStart.className='rec-btn rec-start'; rStart.id='rec-start'; rStart.innerHTML='🎙️ 録音'; rStart.onclick=recStart;
    const rStop=document.createElement('button'); rStop.className='rec-btn rec-stop'; rStop.id='rec-stop'; rStop.textContent='■ 停止'; rStop.style.display='none'; rStop.onclick=recStop;
    const rDel=document.createElement('button'); rDel.className='rec-btn rec-del'; rDel.id='rec-del'; rDel.textContent='🗑️ 削除'; rDel.style.display='none'; rDel.onclick=recDelete;
    const rStatus=document.createElement('span'); rStatus.className='rec-status'; rStatus.id='rec-status';
    rrow.appendChild(rStart); rrow.appendChild(rStop); rrow.appendChild(rDel); rrow.appendChild(rStatus);
    const rAudio=document.createElement('audio'); rAudio.id='rec-audio'; rAudio.className='rec-audio'; rAudio.controls=true; rAudio.style.display='none';
    rbox.appendChild(rrow); rbox.appendChild(rAudio);
    div.appendChild(rbox);
  }

  // カウンター（c2専用）
  if(item.counter){
    const wcBox=document.createElement('div'); wcBox.className='wc-box';
    const wcDisp=document.createElement('div'); wcDisp.className='wc-display';
    const wcNum=document.createElement('span'); wcNum.className='wc-num'; wcNum.id='wc-'+item.id; wcNum.textContent='0';
    const wcUnit=document.createElement('span'); wcUnit.className='wc-unit'; wcUnit.textContent='語';
    wcDisp.appendChild(wcNum); wcDisp.appendChild(wcUnit);
    const wcBtns=document.createElement('div'); wcBtns.className='wc-btns';
    const wcMinus=document.createElement('button'); wcMinus.className='wc-btn'; wcMinus.textContent='−';
    const wcPlus=document.createElement('button'); wcPlus.className='wc-btn plus'; wcPlus.textContent='+';
    const wcReset=document.createElement('button'); wcReset.className='wc-btn reset'; wcReset.textContent='リセット';
    wcMinus.onclick=()=>{
      const el=document.getElementById('wc-'+item.id);
      const v=Math.max(0,parseInt(el.textContent)-1); el.textContent=v;
      autoScoreFromCount(item.id,v,item.guide);
    };
    wcPlus.onclick=()=>{
      const el=document.getElementById('wc-'+item.id);
      const v=parseInt(el.textContent)+1; el.textContent=v;
      autoScoreFromCount(item.id,v,item.guide);
    };
    wcReset.onclick=()=>{
      const el=document.getElementById('wc-'+item.id); el.textContent='0';
      autoScoreFromCount(item.id,0,item.guide);
    };
    wcBtns.appendChild(wcMinus); wcBtns.appendChild(wcPlus); wcBtns.appendChild(wcReset);
    wcBox.appendChild(wcDisp); wcBox.appendChild(wcBtns);
    div.appendChild(wcBox);
  }

  // スコアボタン行
  const row=document.createElement('div'); row.className='score-row-fab';
  const val=document.createElement('div'); val.className='partial-val'; val.id='pv-'+item.id; val.textContent='− / 3'; row.appendChild(val);
  const btns=document.createElement('div'); btns.className='partial-btns';
  for(let v=0;v<=3;v++){
    const b=document.createElement('button'); b.className='pt-btn'; b.textContent=v; b.id=`pb-${item.id}-${v}`;
    b.onclick=()=>setPartial(item.id,v,item.guide); btns.appendChild(b);
  }
  row.appendChild(btns); div.appendChild(row);
  return div;
}

function autoScoreFromCount(id,count,guide){
  const v=count>=10?3:count>=6?2:count>=3?1:0;
  setPartial(id,v,guide);
}

function setPartial(id,val,guide){
  sc[id]=val;
  document.getElementById('pv-'+id).textContent=val+' / 3';
  for(let v=0;v<=3;v++){
    const b=document.getElementById(`pb-${id}-${v}`);
    if(b) b.classList.toggle('sel',v===val);
  }
  // 採点基準のハイライト（選択した点に対応する行を強調）
  if(guide){
    guide.forEach((g,i)=>{
      const el=document.getElementById(`guide-${id}-${i}`);
      if(el) el.classList.toggle('guide-active', i===(3-val));
    });
  }
  updTotal();
}

function updTotal(){
  let n=0; Object.values(sc).forEach(v=>{if(v!==null)n+=v;});
  document.getElementById('ex-live').textContent=n+' / '+TOTAL;
  document.getElementById('bar-n').textContent=n;
}

function getTotal(){let n=0;Object.values(sc).forEach(v=>{if(v)n+=v;});return n;}

function finish(){
  SECS.forEach(s=>s.items.forEach(item=>{if(sc[item.id]===null)sc[item.id]=0;}));
  const total=getTotal();
  const rec={ini:session.ini,dt:session.dt,total,sc:{...sc},ts:Date.now()};
  log.unshift(rec); saveLog(); renderLog(); buildResult(rec); show('result');
}

function quit(){if(confirm('中断しますか？'))show('home');}


const NORM=[
  {age:'20〜29歳', mean:16.7, sd:0.8},
  {age:'30〜39歳', mean:17.0, sd:0.8},
  {age:'40〜49歳', mean:16.1, sd:1.0},
  {age:'50〜59歳', mean:15.3, sd:1.4},
  {age:'60〜69歳', mean:14.6, sd:0.9},
  {age:'70〜79歳', mean:14.4, sd:1.3},
];
function buildResult(rec){
  const hero=document.getElementById('r-hero'); hero.className='res-hero';
  document.getElementById('r-ini').textContent=rec.ini;
  document.getElementById('r-big').textContent=rec.total;
  document.getElementById('r-judge').textContent='';
  document.getElementById('r-dt').textContent=fmtDT(rec.dt);
  const det=document.getElementById('r-det'); det.innerHTML='';
  SECS.forEach(sec=>{
    const block=document.createElement('div'); block.className='det-sec';
    const lbl=document.createElement('div'); lbl.className='det-sec-lbl'; lbl.textContent=sec.label; block.appendChild(lbl);
    sec.items.forEach(item=>{
      const v=rec.sc[item.id]||0, max=item.max;
      const row=document.createElement('div'); row.className='det-row';
      row.innerHTML=`<span class="det-q">${h(item.q.slice(0,30))}</span><span class="det-sc">${v} / ${max}</span>`;
      block.appendChild(row);
    });
    det.appendChild(block);
  });
  // 基準値表
  const nb=document.getElementById('norm-body'); nb.innerHTML='';
  NORM.forEach(nr=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${nr.age}</td><td>${nr.mean.toFixed(1)} ± ${nr.sd.toFixed(1)}</td>`;
    nb.appendChild(tr);
  });
}

function clearAllLog(){
  if(!confirm('記録をすべて削除しますか？\nこの操作は元に戻せません。')) return;
  log=[]; saveLog(); renderLog();
}

function deleteOneLog(ts){
  if(!confirm('この記録を削除しますか？')) return;
  log=log.filter(r=>r.ts!==ts); saveLog(); renderLog();
}

function renderLog(){
  const el=document.getElementById('log-list');
  const clearBtn=document.getElementById('clear-all-btn');
  if(!log.length){
    el.innerHTML='<div class="log-empty">記録なし</div>';
    if(clearBtn) clearBtn.style.display='none';
    return;
  }
  if(clearBtn) clearBtn.style.display='inline-block';
  el.innerHTML='';
  log.forEach(rec=>{
    const s=rec.total;
    const row=document.createElement('div'); row.className='log-row';
    // 左エリア（タップで結果表示）
    const left=document.createElement('div'); left.className='log-left'; left.style.flex='1'; left.style.cursor='pointer';
    left.innerHTML=`<div class="ini">${h(rec.ini)}</div><div class="dt">${fmtDT(rec.dt)}</div>`;
    left.onclick=()=>{buildResult(rec);show('result');};
    // 右エリア（スコア＋削除ボタン）
    const right=document.createElement('div'); right.className='log-right'; right.style.display='flex'; right.style.alignItems='center'; right.style.gap='.5rem';
    const score=document.createElement('div'); score.className='log-sc';
    score.innerHTML=`${s}<span style="font-size:.68rem;font-weight:400;color:var(--muted)"> /18</span>`;
    const del=document.createElement('button');
    del.textContent='🗑️';
    del.style.cssText='background:none;border:none;font-size:1rem;cursor:pointer;padding:4px;opacity:.5;';
    del.onclick=(e)=>{e.stopPropagation(); deleteOneLog(rec.ts);};
    right.appendChild(score); right.appendChild(del);
    row.appendChild(left); row.appendChild(right);
    el.appendChild(row);
  });
}

function goHome(){show('home');}
function newExam(){
  document.getElementById('ini').value='';
  const now=new Date(),loc=new Date(now-now.getTimezoneOffset()*60000);
  document.getElementById('dt').value=loc.toISOString().slice(0,16);
  show('home'); setTimeout(()=>document.getElementById('ini').focus(),100);
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function fmtDT(s){if(!s)return'';const d=new Date(s),p=n=>String(n).padStart(2,'0');return`${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
